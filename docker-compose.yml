version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marzano
      POSTGRES_PASSWORD: marzano
      POSTGRES_DB: marzano
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marzano"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────
  backend:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://marzano:marzano@postgres:5432/marzano
      - RAG_INDEX_PATH=/data/marzano_index.json
      - DATA_DIR=/data
    volumes:
      - rag_data:/data
      - ./backend:/app       # live reload in dev
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (nginx) ──────────────────────────────────────
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Ollama (optional — uncomment to use local AI) ─────────
  # ollama:
  #   image: ollama/ollama
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  postgres_data:
  rag_data:

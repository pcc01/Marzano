
# ── AI provider selection ───────────────────────────────────────────────────
# Set AI_PROVIDER=anthropic in .env  →  uses the Anthropic API (default)
# Set AI_PROVIDER=ollama    in .env  →  uses the local Ollama service
#
# To switch to Ollama:
#   1. Edit .env: AI_PROVIDER=ollama  (and set OLLAMA_MODEL, e.g. llama3 or llava)
#   2. Uncomment the ollama service block below
#   3. Uncomment ollama_models in the volumes section at the bottom
#   4. docker compose up --build
#   5. docker compose exec ollama ollama pull llama3
# ───────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marzano
      POSTGRES_PASSWORD: marzano
      POSTGRES_DB: marzano
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marzano"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://marzano:marzano@postgres:5432/marzano
      - OLLAMA_HOST=http://host.docker.internal:11434   # for AI_PROVIDER=ollama, allows backend to reach Ollama on the host machine
      - RAG_INDEX_PATH=/data/marzano_index.json
      - DATA_DIR=/data
    volumes:
      - rag_data:/data
      - ./backend:/app       # live-reload in dev (uvicorn --reload)
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      # Uncomment the line below when using Ollama so the backend waits for it:
     # ollama:
      #   condition: service_healthy
    #restart: unless-stopped 

  # ── Frontend (nginx) ───────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Ollama — local AI (optional) ───────────────────────────────────────────
  # Uncomment this entire block to run AI locally without an API key.
  # Requires Docker Desktop with enough RAM: llama3 ≈ 5 GB, llava ≈ 4 GB.
  #

#  ollama:
 #  image: ollama/ollama
  #   volumes:
   #    - ollama_models:/root/.ollama
    # ports:
     #  - "11434:11434"
     #healthcheck:
     #3  test: ["CMD", "ollama", "list"]
       #interval: 10s
       #timeout: 5s
      # retries: 12
       #start_period: 30s
     #restart: unless-stopped
  #   # GPU support (Nvidia) — remove if running CPU-only:
#     deploy:
 #      resources:
  #       reservations:
   #        devices:
    #         - driver: nvidia
     #          count: all
      #         capabilities: [gpu]

volumes:
  postgres_data:
  rag_data:
  ollama_models:   # uncomment when using Ollama

